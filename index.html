<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WSL Chest Results</title>

<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  padding: 20px;
}
h1 { text-align: center; margin-bottom: 25px; }
.container { background: #111827; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
table.dataTable { color: white; }
table.dataTable thead { background: #1f2937; }
.top-player { background: linear-gradient(90deg, #7c2d12, #b45309) !important; font-weight: bold; }
.top-1 { background: linear-gradient(90deg, #854d0e, #facc15) !important; color: black !important; font-weight: bold; }
@media (max-width: 768px) { body { padding: 10px; } }
</style>
</head>
<body>

<h1>🏆 WSL Chest Results</h1>
<div class="container">
  <div id="generatedAt" style="text-align:right; margin-bottom:10px; color:#fbbf24;"></div>
  <table id="statsTable" class="display" style="width:100%">
    <thead></thead>
    <tbody></tbody>
  </table>
</div>

<!-- jQuery & DataTables -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
async function loadCsv() {
  try {
    const response = await fetch("data.csv?v=" + new Date().getTime()); // bypass cache
    const text = await response.text();

    const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);

    // ✅ ищем GeneratedAt
    let generatedAt = "";
    if(lines[0].startsWith("# GeneratedAt:")) {
      generatedAt = lines[0].replace("# GeneratedAt:", "").trim();
      document.getElementById("generatedAt").textContent = "Обновлено: " + generatedAt;
    }

    // получаем только строки с данными (игнорируем комментарии)
    const dataRows = lines.filter(l => !l.startsWith("#")).map(l => l.split(","));

    if(dataRows.length < 2) throw new Error("Нет данных в CSV");

    const headers = dataRows[0];
    const data = dataRows.slice(1).filter(r => r.length === headers.length);

    // удаляем дубли по имени (case-insensitive)
    const map = new Map();
    data.forEach(r => {
      const name = r[0].trim().toLowerCase();
      const points = parseInt(r[3] || "0");
      if(!map.has(name) || parseInt(map.get(name)[3]) < points) {
        map.set(name, r);
      }
    });

    const cleaned = Array.from(map.values()).sort((a,b) => (parseInt(b[3])||0) - (parseInt(a[3])||0));

    // строим таблицу
    const thead = document.querySelector("#statsTable thead");
    const headerRow = document.createElement("tr");
    headers.forEach(h => {
      const th = document.createElement("th");
      th.textContent = h;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);

    $('#statsTable').DataTable({
      data: cleaned,
      columns: headers.map(h => ({title: h})),
      order: [[3, "desc"]],
      pageLength: 25,
      createdRow: function(row, data, dataIndex) {
        if(dataIndex === 0) $(row).addClass("top-1");
        else if(dataIndex < 10) $(row).addClass("top-player");
      }
    });

  } catch(err) {
    console.error("Ошибка при загрузке CSV:", err);
    document.body.innerHTML += "<p style='color:red;'>Ошибка загрузки CSV. Проверьте консоль.</p>";
  }
}

loadCsv();
</script>

</body>
</html>
